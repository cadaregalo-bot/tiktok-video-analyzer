<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok 短视频拆解工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg-card: #13131a;
    --bg-card-hover: #1a1a24;
    --bg-input: #1a1a24;
    --border: #2a2a3a;
    --border-focus: #6366f1;
    --text: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --accent: #6366f1;
    --accent-light: #818cf8;
    --accent-glow: rgba(99, 102, 241, 0.15);
    --accent-glow-strong: rgba(99, 102, 241, 0.3);
    --green: #10b981;
    --green-bg: rgba(16, 185, 129, 0.1);
    --green-border: rgba(16, 185, 129, 0.3);
    --orange: #f59e0b;
    --orange-bg: rgba(245, 158, 11, 0.1);
    --orange-border: rgba(245, 158, 11, 0.3);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.1);
    --red-border: rgba(239, 68, 68, 0.3);
    --teal: #14b8a6;
    --teal-bg: rgba(20, 184, 166, 0.1);
    --teal-border: rgba(20, 184, 166, 0.3);
    --pink: #ec4899;
    --pink-bg: rgba(236, 72, 153, 0.1);
    --pink-border: rgba(236, 72, 153, 0.3);
    --amber: #d97706;
    --amber-bg: rgba(217, 119, 6, 0.1);
    --amber-border: rgba(217, 119, 6, 0.3);
    --blue: #3b82f6;
    --blue-bg: rgba(59, 130, 246, 0.1);
    --blue-border: rgba(59, 130, 246, 0.3);
    --slate: #64748b;
    --slate-bg: rgba(100, 116, 139, 0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .status-text {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* ===== LAYOUT ===== */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ===== UPLOAD ZONE ===== */
  .upload-zone {
    background: var(--bg-card);
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, var(--accent-glow), transparent 70%);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .upload-zone:hover,
  .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--bg-card-hover);
  }
  .upload-zone:hover::before,
  .upload-zone.drag-over::before {
    opacity: 1;
  }
  .upload-icon {
    font-size: 48px;
    margin-bottom: 16px;
    position: relative;
  }
  .upload-text {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    position: relative;
  }
  .upload-hint {
    font-size: 14px;
    color: var(--text-muted);
    position: relative;
  }
  .upload-hint span {
    color: var(--accent-light);
    text-decoration: underline;
    cursor: pointer;
  }
  #file-input {
    display: none;
  }

  /* ===== URL INPUT ===== */
  .url-section {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    align-items: stretch;
  }
  .url-input-wrap {
    flex: 1;
    position: relative;
  }
  .url-input-wrap input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px 14px 44px;
    font-size: 15px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color var(--transition);
  }
  .url-input-wrap input::placeholder {
    color: var(--text-muted);
    font-family: 'Noto Sans SC', sans-serif;
  }
  .url-input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .url-input-wrap .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: var(--text-muted);
  }
  .btn-analyze {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    transition: all var(--transition);
    font-family: 'Noto Sans SC', sans-serif;
  }
  .btn-analyze:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px var(--accent-glow-strong);
  }
  .btn-analyze:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ===== PROGRESS ===== */
  .progress-wrap {
    display: none;
    margin-bottom: 32px;
  }
  .progress-wrap.active {
    display: block;
  }
  .progress-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    position: relative;
    overflow: hidden;
  }
  .progress-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--pink), var(--accent));
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
    width: 100%;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .progress-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-title .spinner {
    width: 20px;
    height: 20px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .progress-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .progress-step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text-muted);
    transition: color 0.3s;
  }
  .progress-step.done {
    color: var(--green);
  }
  .progress-step.active {
    color: var(--text);
  }
  .progress-step .step-icon {
    width: 20px;
    text-align: center;
    font-size: 14px;
  }

  /* ===== ERROR ===== */
  .error-card {
    display: none;
    background: var(--red-bg);
    border: 1px solid var(--red-border);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 24px;
    font-size: 14px;
    color: #fca5a5;
  }
  .error-card.active {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .error-card .error-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ===== RESULT CONTAINER ===== */
  .result-wrap {
    display: none;
  }
  .result-wrap.active {
    display: block;
  }

  /* ===== META OVERVIEW ===== */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .meta-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: border-color var(--transition);
  }
  .meta-card:hover {
    border-color: var(--accent);
  }
  .meta-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .meta-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .meta-value.accent { color: var(--accent-light); }
  .meta-value.green { color: var(--green); }
  .meta-value.orange { color: var(--orange); }
  .meta-value.pink { color: var(--pink); }

  /* ===== FRAMEWORK BADGE ===== */
  .framework-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .fw-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .fw-formula {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .fw-step {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
  }
  .fw-step.stop { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
  .fw-step.pain { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
  .fw-step.cure { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .fw-step.trust { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .fw-step.buy { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .fw-step.other { background: var(--slate-bg); color: var(--slate); border: 1px solid rgba(100,116,139,0.3); }
  .fw-arrow {
    color: var(--text-muted);
    font-size: 14px;
  }
  .fw-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent-light);
    margin-left: auto;
  }

  /* ===== SHOT TIMELINE ===== */
  .section-heading {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-heading .heading-icon {
    font-size: 22px;
  }

  .shots-timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    margin-bottom: 36px;
  }
  .shots-timeline::before {
    content: '';
    position: absolute;
    left: 139px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }

  .shot-item {
    display: flex;
    gap: 20px;
    padding: 20px 0;
    position: relative;
  }

  /* Thumbnail area */
  .shot-thumb {
    width: 240px;
    height: 135px;
    border-radius: var(--radius);
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
    background: var(--bg-input);
    border: 1px solid var(--border);
  }
  .shot-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .shot-thumb .thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: var(--text-muted);
    background: linear-gradient(135deg, #1a1a24, #13131a);
  }
  .shot-time-badge {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    backdrop-filter: blur(4px);
  }

  /* Timeline connector dot */
  .shot-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
    z-index: 1;
    border: 2px solid;
  }
  .shot-dot.stop { background: var(--blue-bg); border-color: var(--blue); }
  .shot-dot.pain { background: var(--orange-bg); border-color: var(--orange); }
  .shot-dot.cure { background: var(--green-bg); border-color: var(--green); }
  .shot-dot.trust { background: var(--amber-bg); border-color: var(--amber); }
  .shot-dot.buy { background: var(--red-bg); border-color: var(--red); }
  .shot-dot.other { background: var(--slate-bg); border-color: var(--slate); }

  /* Shot content */
  .shot-content {
    flex: 1;
    min-width: 0;
  }
  .shot-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .shot-role-tag {
    padding: 3px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .shot-role-tag.stop { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
  .shot-role-tag.pain { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
  .shot-role-tag.cure { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .shot-role-tag.trust { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .shot-role-tag.buy { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .shot-role-tag.other { background: var(--slate-bg); color: var(--slate); border: 1px solid rgba(100,116,139,0.3); }
  .shot-number {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .shot-duration {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
  }
  .shot-desc {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 10px;
  }
  .shot-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .shot-tag {
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    background: rgba(255,255,255,0.04);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* ===== ANALYSIS SECTIONS ===== */
  .analysis-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  .analysis-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    transition: border-color var(--transition);
  }
  .analysis-card:hover {
    border-color: var(--accent);
  }
  .analysis-card h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .analysis-card ul {
    list-style: none;
    padding: 0;
  }
  .analysis-card ul li {
    font-size: 14px;
    color: var(--text-secondary);
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.6;
  }
  .analysis-card ul li:last-child {
    border-bottom: none;
  }
  .analysis-card ul li .li-bullet {
    color: var(--accent-light);
    font-size: 8px;
    margin-top: 7px;
    flex-shrink: 0;
  }
  .analysis-card p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  /* Full width analysis card */
  .analysis-full {
    grid-column: 1 / -1;
  }

  /* ===== SCORE ===== */
  .score-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 28px;
  }
  .score-ring {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    flex-shrink: 0;
    position: relative;
  }
  .score-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(var(--accent) calc(var(--score-pct) * 1%), var(--border) 0);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }
  .score-details {
    flex: 1;
  }
  .score-label {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .score-summary {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* ===== ACTION BUTTONS ===== */
  .action-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }
  .btn-secondary {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all var(--transition);
    font-family: 'Noto Sans SC', sans-serif;
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    background: var(--bg-card-hover);
  }
  .btn-secondary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .meta-grid { grid-template-columns: repeat(2, 1fr); }
    .analysis-grid { grid-template-columns: 1fr; }
    .analysis-full { grid-column: auto; }
    .shot-item { flex-direction: column; }
    .shot-thumb { width: 100%; height: 200px; }
    .shots-timeline::before { display: none; }
    .shot-dot { display: none; }
  }
  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .main { padding: 20px 12px; }
    .meta-grid { grid-template-columns: 1fr; }
    .url-section { flex-direction: column; }
    .framework-bar { flex-direction: column; align-items: flex-start; }
    .fw-name { margin-left: 0; }
  }

  /* ===== LIGHTBOX ===== */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    backdrop-filter: blur(8px);
  }
  .lightbox.active {
    display: flex;
  }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">拆</div>
    <div>
      <div class="header-title">TikTok 短视频拆解工具</div>
      <div class="header-subtitle">停 · 病 · 药 · 信 · 买 — 完形填空式拆解</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <span class="status-text">Gemini 2.5 Flash 就绪</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- Upload Zone -->
  <div class="upload-zone" id="upload-zone">
    <div class="upload-icon">📹</div>
    <div class="upload-text">拖拽视频文件到这里</div>
    <div class="upload-hint">支持 MP4 / MOV / AVI，最大 200MB — 或 <span onclick="document.getElementById('file-input').click()">点击选择文件</span></div>
    <input type="file" id="file-input" accept="video/*">
  </div>

  <!-- URL Input -->
  <div class="url-section">
    <div class="url-input-wrap">
      <span class="input-icon">🔗</span>
      <input type="text" id="url-input" placeholder="或粘贴 TikTok 视频链接…">
    </div>
    <button class="btn-analyze" id="btn-analyze" onclick="startAnalysis()">
      <span>⚡</span> 开始拆解
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-card">
      <div class="progress-title">
        <div class="spinner"></div>
        <span>正在拆解视频…</span>
      </div>
      <div class="progress-steps" id="progress-steps">
        <div class="progress-step active" id="ps-upload">
          <span class="step-icon">⏳</span> 上传视频文件
        </div>
        <div class="progress-step" id="ps-ffmpeg">
          <span class="step-icon">○</span> ffmpeg 截帧提取关键画面
        </div>
        <div class="progress-step" id="ps-gemini">
          <span class="step-icon">○</span> Gemini 2.5 Flash 分析视频结构
        </div>
        <div class="progress-step" id="ps-done">
          <span class="step-icon">○</span> 生成拆解报告
        </div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-card" id="error-card">
    <span class="error-icon">⚠️</span>
    <span id="error-msg"></span>
  </div>

  <!-- Result -->
  <div class="result-wrap" id="result-wrap">

    <!-- Meta Overview -->
    <div class="meta-grid" id="meta-grid"></div>

    <!-- Framework Bar -->
    <div class="framework-bar" id="framework-bar"></div>

    <!-- Score Bar -->
    <div class="score-bar" id="score-bar"></div>

    <!-- Shots Timeline -->
    <div class="section-heading">
      <span class="heading-icon">🎬</span>
      镜头逐帧拆解
    </div>
    <div class="shots-timeline" id="shots-timeline"></div>

    <!-- Analysis Cards -->
    <div class="section-heading">
      <span class="heading-icon">📊</span>
      深度分析
    </div>
    <div class="analysis-grid" id="analysis-grid"></div>

    <!-- Action Bar -->
    <div class="action-bar" id="action-bar">
      <button class="btn-secondary" id="btn-save-feishu" onclick="saveToFeishu()" disabled>
        📝 写入飞书多维表格（Phase 2）
      </button>
      <button class="btn-secondary" onclick="resetAll()">
        🔄 拆解下一条
      </button>
    </div>

  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="截帧大图">
</div>

<script>
  // ===== STATE =====
  let currentFile = null;
  let analysisResult = null;

  // ===== UPLOAD ZONE =====
  const uploadZone = document.getElementById('upload-zone');
  const fileInput = document.getElementById('file-input');

  uploadZone.addEventListener('click', (e) => {
    if (e.target.tagName !== 'SPAN') fileInput.click();
  });

  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });

  uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('drag-over');
  });

  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if (files.length > 0 && files[0].type.startsWith('video/')) {
      currentFile = files[0];
      showFileSelected(currentFile);
    }
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      currentFile = fileInput.files[0];
      showFileSelected(currentFile);
    }
  });

  function showFileSelected(file) {
    uploadZone.innerHTML = `
      <div class="upload-icon">✅</div>
      <div class="upload-text">${escapeHtml(file.name)}</div>
      <div class="upload-hint">${(file.size / 1024 / 1024).toFixed(1)} MB — 点击「开始拆解」</div>
    `;
  }

  // ===== ANALYSIS =====
  async function startAnalysis() {
    const urlInput = document.getElementById('url-input');
    const btn = document.getElementById('btn-analyze');

    if (!currentFile && !urlInput.value.trim()) {
      showError('请先上传视频文件或粘贴视频链接');
      return;
    }

    // Reset
    hideError();
    document.getElementById('result-wrap').classList.remove('active');
    showProgress();
    btn.disabled = true;

    try {
      let data;

      if (currentFile) {
        // File upload mode
        updateStep('ps-upload', 'active');
        const formData = new FormData();
        formData.append('video', currentFile);

        updateStep('ps-upload', 'done');
        updateStep('ps-ffmpeg', 'active');

        const resp = await fetch('/api/analyze', {
          method: 'POST',
          body: formData
        });

        updateStep('ps-ffmpeg', 'done');
        updateStep('ps-gemini', 'active');

        if (!resp.ok) {
          const errBody = await resp.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${resp.status}`);
        }

        data = await resp.json();
      } else {
        // URL mode
        updateStep('ps-upload', 'active');
        const resp = await fetch('/api/analyze-url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: urlInput.value.trim() })
        });

        updateStep('ps-upload', 'done');
        updateStep('ps-ffmpeg', 'active');
        updateStep('ps-ffmpeg', 'done');
        updateStep('ps-gemini', 'active');

        if (!resp.ok) {
          const errBody = await resp.json().catch(() => ({}));
          throw new Error(errBody.error || `HTTP ${resp.status}`);
        }

        data = await resp.json();
      }

      updateStep('ps-gemini', 'done');
      updateStep('ps-done', 'active');

      analysisResult = data;
      renderResult(data);

      updateStep('ps-done', 'done');
      setTimeout(() => hideProgress(), 600);

    } catch (err) {
      showError(`拆解失败: ${err.message}`);
      hideProgress();
    } finally {
      btn.disabled = false;
    }
  }

  // ===== RENDER RESULT =====
  function renderResult(data) {
    const r = data.analysis || data;

    // Meta grid
    const metaGrid = document.getElementById('meta-grid');
    metaGrid.innerHTML = `
      <div class="meta-card">
        <div class="meta-label">视频时长</div>
        <div class="meta-value accent">${r.duration || r.video_duration || '--'}</div>
      </div>
      <div class="meta-card">
        <div class="meta-label">镜头数</div>
        <div class="meta-value green">${(r.shots || []).length} 个镜头</div>
      </div>
      <div class="meta-card">
        <div class="meta-label">框架类型</div>
        <div class="meta-value orange">${r.framework_name || r.framework || '--'}</div>
      </div>
      <div class="meta-card">
        <div class="meta-label">内容层级</div>
        <div class="meta-value pink">${r.content_level || r.difficulty || '--'}</div>
      </div>
    `;

    // Framework bar
    const fwBar = document.getElementById('framework-bar');
    const formula = r.formula || r.structure_formula || '';
    const steps = formula.split('→').map(s => s.trim()).filter(Boolean);
    const stepHtml = steps.map(s => {
      const cls = getStepClass(s);
      return `<span class="fw-step ${cls}">${escapeHtml(s)}</span>`;
    }).join('<span class="fw-arrow">→</span>');

    fwBar.innerHTML = `
      <span class="fw-label">底层公式</span>
      <div class="fw-formula">${stepHtml}</div>
      <span class="fw-name">${escapeHtml(r.framework_name || r.framework || '')}</span>
    `;

    // Score bar
    const scoreBar = document.getElementById('score-bar');
    const score = r.score ?? r.overall_score ?? '--';
    const scorePct = typeof score === 'number' ? score : parseInt(score) || 0;
    scoreBar.innerHTML = `
      <div class="score-ring" style="--score-pct: ${scorePct}; color: ${scorePct >= 70 ? 'var(--green)' : scorePct >= 40 ? 'var(--orange)' : 'var(--red)'}">
        ${score}
      </div>
      <div class="score-details">
        <div class="score-label">整体效果评分</div>
        <div class="score-summary">${escapeHtml(r.score_comment || r.overall_comment || '暂无评语')}</div>
      </div>
    `;

    // Shots timeline — KEY FIX: use frame_url for images
    const timeline = document.getElementById('shots-timeline');
    const shots = r.shots || [];
    timeline.innerHTML = shots.map((s, i) => {
      const cls = getStepClass(s.role || s.step || '');
      const frameUrl = s.frame_url || s.thumbnail || s.screenshot || '';
      const thumbHtml = frameUrl
        ? `<img src="${escapeHtml(frameUrl)}" alt="镜头${i + 1}截图" onclick="openLightbox('${escapeHtml(frameUrl)}')" style="cursor:zoom-in;">`
        : `<div class="thumb-placeholder">🎞️</div>`;
      const timecode = s.timecode || s.start_time || s.time || '';
      const duration = s.duration || '';
      const tags = s.tags || s.keywords || [];

      return `
        <div class="shot-item">
          <div class="shot-thumb">
            ${thumbHtml}
            ${timecode ? `<span class="shot-time-badge">${escapeHtml(timecode)}</span>` : ''}
          </div>
          <div class="shot-dot ${cls}"></div>
          <div class="shot-content">
            <div class="shot-header">
              <span class="shot-role-tag ${cls}">${escapeHtml(s.role || s.step || '镜头')}</span>
              <span class="shot-number">#${i + 1}</span>
              ${duration ? `<span class="shot-duration">${escapeHtml(duration)}</span>` : ''}
            </div>
            <div class="shot-desc">${escapeHtml(s.description || s.content || s.desc || '')}</div>
            ${tags.length > 0 ? `
              <div class="shot-tags">
                ${tags.map(t => `<span class="shot-tag">${escapeHtml(t)}</span>`).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');

    // Analysis cards
    const analysisGrid = document.getElementById('analysis-grid');
    const sections = [];

    if (r.hook_analysis || r.hook) {
      sections.push({ icon: '🪝', title: '钩子分析（停）', content: r.hook_analysis || r.hook, type: 'text' });
    }
    if (r.pain_points || r.pain_analysis) {
      const pain = r.pain_points || r.pain_analysis;
      sections.push({ icon: '🔥', title: '痛点分析（病）', content: pain, type: Array.isArray(pain) ? 'list' : 'text' });
    }
    if (r.selling_points || r.cure_analysis) {
      const sell = r.selling_points || r.cure_analysis;
      sections.push({ icon: '💊', title: '卖点分析（药）', content: sell, type: Array.isArray(sell) ? 'list' : 'text' });
    }
    if (r.social_proof || r.trust_analysis) {
      const trust = r.social_proof || r.trust_analysis;
      sections.push({ icon: '🏅', title: '信任要素（信）', content: trust, type: Array.isArray(trust) ? 'list' : 'text' });
    }
    if (r.cta_analysis || r.cta) {
      sections.push({ icon: '🛒', title: 'CTA分析（买）', content: r.cta_analysis || r.cta, type: 'text' });
    }
    if (r.bgm_analysis || r.bgm) {
      sections.push({ icon: '🎵', title: 'BGM 分析', content: r.bgm_analysis || r.bgm, type: 'text' });
    }
    if (r.reusable_points || r.highlights) {
      const reuse = r.reusable_points || r.highlights;
      sections.push({ icon: '✨', title: '可复用点', content: reuse, type: Array.isArray(reuse) ? 'list' : 'text', full: true });
    }
    if (r.improvement || r.suggestions) {
      const improve = r.improvement || r.suggestions;
      sections.push({ icon: '💡', title: '改进建议', content: improve, type: Array.isArray(improve) ? 'list' : 'text', full: true });
    }

    analysisGrid.innerHTML = sections.map(sec => {
      const fullCls = sec.full ? 'analysis-full' : '';
      let body = '';
      if (sec.type === 'list' && Array.isArray(sec.content)) {
        body = `<ul>${sec.content.map(item =>
          `<li><span class="li-bullet">●</span>${escapeHtml(typeof item === 'string' ? item : item.text || item.description || JSON.stringify(item))}</li>`
        ).join('')}</ul>`;
      } else {
        body = `<p>${escapeHtml(String(sec.content || ''))}</p>`;
      }
      return `
        <div class="analysis-card ${fullCls}">
          <h3><span>${sec.icon}</span> ${escapeHtml(sec.title)}</h3>
          ${body}
        </div>
      `;
    }).join('');

    // Show result
    document.getElementById('result-wrap').classList.add('active');
  }

  // ===== HELPERS =====
  function getStepClass(role) {
    const r = (role || '').toLowerCase();
    if (r.includes('停') || r.includes('stop') || r.includes('hook') || r.includes('钩')) return 'stop';
    if (r.includes('病') || r.includes('pain') || r.includes('痛')) return 'pain';
    if (r.includes('药') || r.includes('cure') || r.includes('卖') || r.includes('product') || r.includes('sell')) return 'cure';
    if (r.includes('信') || r.includes('trust') || r.includes('proof') || r.includes('证')) return 'trust';
    if (r.includes('买') || r.includes('buy') || r.includes('cta') || r.includes('促')) return 'buy';
    return 'other';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  // ===== PROGRESS =====
  function showProgress() {
    document.getElementById('progress-wrap').classList.add('active');
    ['ps-upload', 'ps-ffmpeg', 'ps-gemini', 'ps-done'].forEach(id => {
      const el = document.getElementById(id);
      el.className = 'progress-step';
      el.querySelector('.step-icon').textContent = '○';
    });
    updateStep('ps-upload', 'active');
  }

  function hideProgress() {
    document.getElementById('progress-wrap').classList.remove('active');
  }

  function updateStep(id, state) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = `progress-step ${state}`;
    const icon = el.querySelector('.step-icon');
    if (state === 'done') icon.textContent = '✓';
    else if (state === 'active') icon.textContent = '⏳';
    else icon.textContent = '○';
  }

  // ===== ERROR =====
  function showError(msg) {
    const card = document.getElementById('error-card');
    document.getElementById('error-msg').textContent = msg;
    card.classList.add('active');
  }

  function hideError() {
    document.getElementById('error-card').classList.remove('active');
  }

  // ===== LIGHTBOX =====
  function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = src;
    lb.classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });

  // ===== FEISHU STUB =====
  async function saveToFeishu() {
    showError('飞书写入功能将在 Phase 2 实现');
  }

  // ===== RESET =====
  function resetAll() {
    currentFile = null;
    analysisResult = null;
    fileInput.value = '';
    document.getElementById('url-input').value = '';
    document.getElementById('result-wrap').classList.remove('active');
    hideError();
    hideProgress();

    const uz = document.getElementById('upload-zone');
    uz.innerHTML = `
      <div class="upload-icon">📹</div>
      <div class="upload-text">拖拽视频文件到这里</div>
      <div class="upload-hint">支持 MP4 / MOV / AVI，最大 200MB — 或 <span onclick="document.getElementById('file-input').click()">点击选择文件</span></div>
    `;
  }
</script>

</body>
</html>
